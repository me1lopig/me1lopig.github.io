<header class="site-header">
  <div class="container">
    <div class="header-content">
      <a href="{{ '/' | relative_url }}" class="site-title">
        {{ site.title }}
      </a>
      
      <nav class="site-nav">
        <ul>
          <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Inicio</a></li>
          <li><a href="{{ '/repos/' | relative_url }}" {% if page.url == '/repos/' %}class="active"{% endif %}>Repositorios</a></li>
          <li><a href="{{ '/posts/' | relative_url }}" {% if page.url == '/posts/' %}class="active"{% endif %}>Blog</a></li>
          <li><a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>Sobre mí</a></li>
        </ul>
      </nav>
      
      <button class="mobile-menu-toggle" aria-label="Menú">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </div>
</header>

<div class="mobile-menu">
